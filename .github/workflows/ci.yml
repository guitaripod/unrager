name: ci

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # Native-target lint + test matrix across feature combinations.
  # Catches regressions in the feature gates (server, tui) that the default
  # build wouldn't surface.
  check:
    name: ${{ matrix.flavor }} · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
        flavor:
          - { name: "default",            features: "" }
          - { name: "tui only",           features: "--no-default-features --features tui" }
          - { name: "cli only",           features: "--no-default-features" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.flavor.name }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.flavor.name }}-
            ${{ runner.os }}-cargo-

      - name: Install system deps for secret-service
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      # Stub the web bundle so rust-embed has a folder to compile against on
      # the default flavor. The real bundle is produced by the web-bundle job
      # and packaged at release time; for compile-only checks, an empty
      # placeholder is sufficient.
      - name: Stub web bundle (default flavor only)
        if: matrix.flavor.name == 'default'
        run: |
          mkdir -p crates/unrager-app/dist
          echo "<!doctype html><title>stub</title>" > crates/unrager-app/dist/index.html

      # fmt + test only need to run once per OS; run on the default flavor
      - name: cargo fmt --check
        if: matrix.flavor.name == 'default'
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets ${{ matrix.flavor.features }} -- -D warnings

      - name: cargo test
        if: matrix.flavor.name == 'default'
        run: cargo test --workspace --all-targets

      # Smoke the binary — verifies the CLI dispatch still compiles and
      # subcommands parse. We can't actually start `unrager serve` without
      # X browser cookies, so we just exercise --help.
      - name: cargo build (release, for smoke)
        run: cargo build --release ${{ matrix.flavor.features }}

      - name: unrager --version
        run: cargo run --release ${{ matrix.flavor.features }} -- --version

      - name: unrager --help
        run: cargo run --release ${{ matrix.flavor.features }} -- --help > /dev/null

      - name: unrager serve --help (default flavor only)
        if: matrix.flavor.name == 'default'
        run: cargo run --release -- serve --help > /dev/null

  # Client-only lint against the browser target. Catches wasm-specific
  # regressions in the Dioxus app that native builds miss (e.g., a call
  # site that only compiles when web_sys is available).
  wasm-check:
    name: wasm32 clippy (Dioxus client)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain with wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-

      - name: clippy --target wasm32
        run: cargo clippy -p unrager-app --target wasm32-unknown-unknown --all-targets -- -D warnings

  # Actually build the PWA bundle so we catch Dioxus bundler regressions
  # before release day. Also sanity-checks the static assets (manifest,
  # service worker, icons) exist in the packaged bundle.
  web-bundle:
    name: web bundle (dx)
    needs: wasm-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain with wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-webbundle-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-webbundle-

      - name: Install dioxus-cli via cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install dioxus-cli
        run: cargo binstall -y --force dioxus-cli

      - name: Bundle web client
        working-directory: crates/unrager-app
        run: dx bundle --platform web --release

      - name: Stage + verify static assets
        run: |
          set -eux
          rm -rf crates/unrager-app/dist
          mkdir -p crates/unrager-app/dist
          cp -r target/dx/unrager-app/release/web/public/. crates/unrager-app/dist/
          cp crates/unrager-app/static/* crates/unrager-app/dist/
          # Every file the PWA needs must be present after bundling.
          test -f crates/unrager-app/dist/index.html
          test -f crates/unrager-app/dist/manifest.webmanifest
          test -f crates/unrager-app/dist/sw.js
          test -f crates/unrager-app/dist/icon.svg
          # WASM blob and JS glue — Dioxus names them with hashes, so glob.
          ls crates/unrager-app/dist/assets/*.wasm
          ls crates/unrager-app/dist/assets/*.js

      - name: Verify manifest is valid JSON
        run: python3 -m json.tool crates/unrager-app/dist/manifest.webmanifest > /dev/null

      - name: Build binary with bundle embedded (full flavor)
        run: cargo build --release

      - name: Smoke-test embedded bundle
        run: |
          set -eux
          # rust-embed compresses so we can't grep for index.html directly,
          # but we can check the binary got noticeably bigger.
          SIZE=$(stat -c%s target/release/unrager)
          echo "binary size: $SIZE"
          test "$SIZE" -gt 16000000
          ./target/release/unrager --version
          ./target/release/unrager serve --help > /dev/null

  publish-dry-run:
    name: crates.io publish dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-dryrun-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-dryrun-

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Stub web bundle
        run: |
          mkdir -p crates/unrager-app/dist
          echo "<!doctype html><title>stub</title>" > crates/unrager-app/dist/index.html

      - name: Dry-run publish unrager-model
        run: cargo publish --dry-run -p unrager-model

      - name: Dry-run publish unrager
        run: |
          set -eux
          V=$(cargo metadata --format-version=1 --no-deps \
              | jq -r '.packages[] | select(.name=="unrager-model") | .version')
          if curl -sfLI "https://crates.io/api/v1/crates/unrager-model/$V" >/dev/null 2>&1; then
            echo "unrager-model $V present on crates.io — running full dry-run"
            cargo publish --dry-run -p unrager
          else
            echo "unrager-model $V not yet on crates.io — validating package list only"
            cargo package --list -p unrager > /dev/null
          fi
