name: deploy site

on:
  push:
    paths:
      - 'site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

concurrency:
  group: deploy-site-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: cloudflare pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Regenerate og.png from template
        run: |
          python3 -m pip install --quiet playwright
          python3 -m playwright install --with-deps chromium
          python3 site/og/render.py

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: site
          command: >-
            pages deploy public
            --project-name=unrager
            --branch=${{ github.ref == 'refs/heads/master' && 'main' || github.ref_name }}
