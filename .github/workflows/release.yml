name: release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: fmt / clippy / test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}

      - name: Install libdbus (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      # Stub the web bundle so rust-embed can compile. The real bundle is
      # built by the `web-bundle` job and consumed by the `build` matrix.
      - name: Stub web bundle
        run: |
          mkdir -p crates/unrager-app/dist
          echo "<!doctype html><title>stub</title>" > crates/unrager-app/dist/index.html

      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --all-targets

  web-bundle:
    # ubuntu-latest (24.04), not 22.04, because the cargo-binstall-installed
    # `dx` binary is linked against GLIBC 2.39 which only exists on 24.04+.
    # The downstream binary builds still use 22.04 for broader compat.
    name: build web bundle (WASM)
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-web-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dioxus-cli via cargo-binstall
        uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall -y --force dioxus-cli

      - name: Bundle web client
        working-directory: crates/unrager-app
        run: dx bundle --platform web --release

      - name: Stage bundle
        run: |
          mkdir -p bundle-upload
          cp -r target/dx/unrager-app/release/web/public/. bundle-upload/
          ls -la bundle-upload

      - uses: actions/upload-artifact@v7
        with:
          name: web-bundle
          path: bundle-upload
          retention-days: 7

  build:
    name: build ${{ matrix.flavor }} · ${{ matrix.target }}
    needs: [check, web-bundle]
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - { os: ubuntu-22.04, target: x86_64-unknown-linux-gnu, use_cross: false, flavor: full, features: "" }
          - { os: ubuntu-22.04, target: x86_64-unknown-linux-gnu, use_cross: false, flavor: tui,  features: "--no-default-features --features tui" }
          - { os: ubuntu-22.04, target: x86_64-unknown-linux-gnu, use_cross: false, flavor: cli,  features: "--no-default-features" }
          # Linux aarch64 (cross)
          - { os: ubuntu-22.04, target: aarch64-unknown-linux-gnu, use_cross: true,  flavor: full, features: "" }
          - { os: ubuntu-22.04, target: aarch64-unknown-linux-gnu, use_cross: true,  flavor: tui,  features: "--no-default-features --features tui" }
          - { os: ubuntu-22.04, target: aarch64-unknown-linux-gnu, use_cross: true,  flavor: cli,  features: "--no-default-features" }
          # macOS arm64
          - { os: macos-14,     target: aarch64-apple-darwin,      use_cross: false, flavor: full, features: "" }
          - { os: macos-14,     target: aarch64-apple-darwin,      use_cross: false, flavor: tui,  features: "--no-default-features --features tui" }
          - { os: macos-14,     target: aarch64-apple-darwin,      use_cross: false, flavor: cli,  features: "--no-default-features" }
          # macOS x86_64
          - { os: macos-14,     target: x86_64-apple-darwin,       use_cross: false, flavor: full, features: "" }
          - { os: macos-14,     target: x86_64-apple-darwin,       use_cross: false, flavor: tui,  features: "--no-default-features --features tui" }
          - { os: macos-14,     target: x86_64-apple-darwin,       use_cross: false, flavor: cli,  features: "--no-default-features" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ matrix.target }}-${{ matrix.flavor }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install libdbus (native Linux build)
        if: matrix.os == 'ubuntu-22.04' && !matrix.use_cross
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Download web bundle (full flavor only)
        if: matrix.flavor == 'full'
        uses: actions/download-artifact@v8
        with:
          name: web-bundle
          path: crates/unrager-app/dist

      - name: Build (native)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.features }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} ${{ matrix.features }}

      - name: Package
        run: |
          set -eux
          cd target/${{ matrix.target }}/release
          case "${{ matrix.flavor }}" in
            full) ASSET="unrager-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" ;;
            *)    ASSET="unrager-${{ github.ref_name }}-${{ matrix.flavor }}-${{ matrix.target }}.tar.gz" ;;
          esac
          tar czf "../../../${ASSET}" unrager
          echo "ASSET=${ASSET}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v7
        with:
          name: unrager-${{ matrix.flavor }}-${{ matrix.target }}
          path: ${{ env.ASSET }}
          retention-days: 7

  linux-validate:
    name: validate ${{ matrix.flavor }} on ${{ matrix.distro }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flavor: [full, tui, cli]
        distro:
          - debian:12
          - ubuntu:24.04
          - archlinux:latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: unrager-${{ matrix.flavor }}-x86_64-unknown-linux-gnu
          path: ./artifact

      - name: Run binary inside ${{ matrix.distro }}
        run: |
          docker run --rm -v "$PWD/artifact:/artifact:ro" ${{ matrix.distro }} sh -c '
            set -eux
            cd /tmp
            tar xzf /artifact/*.tar.gz
            ./unrager --version
            ./unrager --help > /dev/null
            if [ "${{ matrix.flavor }}" = "full" ]; then
              ./unrager serve --help > /dev/null
            fi
            if [ "${{ matrix.flavor }}" != "cli" ]; then
              ./unrager whoami 2>&1 | grep -qE "no Chromium-family cookie store|no x.com session" && echo "whoami error path OK"
            fi
          '

  macos-validate:
    name: validate ${{ matrix.flavor }} on ${{ matrix.os }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14, target: aarch64-apple-darwin, flavor: full }
          - { os: macos-14, target: aarch64-apple-darwin, flavor: tui }
          - { os: macos-14, target: aarch64-apple-darwin, flavor: cli }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: unrager-${{ matrix.flavor }}-${{ matrix.target }}
          path: ./artifact

      - name: Run binary
        run: |
          set -eux
          cd /tmp
          tar xzf "$GITHUB_WORKSPACE/artifact"/*.tar.gz
          xattr -d com.apple.quarantine ./unrager 2>/dev/null || true
          ./unrager --version
          ./unrager --help > /dev/null
          if [ "${{ matrix.flavor }}" = "full" ]; then
            ./unrager serve --help > /dev/null
          fi
          if [ "${{ matrix.flavor }}" != "cli" ]; then
            ./unrager whoami 2>&1 | grep -qE "no Chromium-family cookie store|no x.com session|User interaction is not allowed" && echo "whoami error path OK"
          fi

  release:
    name: create github release
    needs: [linux-validate, macos-validate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: ./dist
          merge-multiple: true

      - name: Drop web-bundle artifact (not a release asset)
        run: |
          cd dist
          ls -la
          rm -rf index.html assets wasm
          ls -la

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Generate release notes
        run: |
          TAG="${{ github.ref_name }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+' | sed -n '2p')

          if [ -z "$PREV_TAG" ]; then
            RANGE="$TAG"
          else
            RANGE="${PREV_TAG}..${TAG}"
          fi

          declare -A SECTIONS
          SECTIONS=(
            [feat]="Features"
            [fix]="Fixes"
            [tune]="Tuning"
            [style]="Styling"
          )
          declare -A BUCKETS

          while IFS= read -r line; do
            msg="${line#* }"

            if echo "$msg" | grep -qE '^(chore|docs)'; then
              continue
            fi

            prefix=$(echo "$msg" | sed -n 's/^\([a-z]*\).*/\1/p')
            body=$(echo "$msg" | sed 's/^[a-z]*\(([^)]*)\)\{0,1\}: *//')

            header="${SECTIONS[$prefix]:-Other}"
            BUCKETS["$header"]+="- ${body}"$'\n'
          done < <(git log --oneline --no-decorate "$RANGE")

          {
            for section in "Features" "Fixes" "Tuning" "Styling" "Other"; do
              if [ -n "${BUCKETS[$section]:-}" ]; then
                echo "## $section"
                echo ""
                echo -n "${BUCKETS[$section]}"
                echo ""
              fi
            done
            echo ""
            echo "## Install flavors"
            echo ""
            echo "The oneliner installer supports three flavors via the \`UNRAGER_FLAVOR\` env var:"
            echo ""
            echo '```sh'
            echo '# full: TUI + HTTP server + embedded web client (default)'
            echo 'curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/master/install.sh | bash'
            echo ''
            echo '# tui: TUI + CLI only (~8 MB smaller)'
            echo 'UNRAGER_FLAVOR=tui curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/master/install.sh | bash'
            echo ''
            echo '# cli: CLI only (~11 MB smaller)'
            echo 'UNRAGER_FLAVOR=cli curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/master/install.sh | bash'
            echo '```'
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "**Full changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
            fi
          } > RELEASE_NOTES.md

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file RELEASE_NOTES.md \
            dist/*.tar.gz dist/SHA256SUMS
